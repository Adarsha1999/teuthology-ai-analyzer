# Teuthology AI — Docker Compose stack
# Usage:
#   Full stack:  docker compose up --build
#   Dev (SQLite): docker compose up backend frontend --build

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: teuth
      POSTGRES_PASSWORD: teuth123
      POSTGRES_DB: teuthology_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teuth"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama
      - full

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://teuth:teuth123@postgres:5432/teuthology_ai
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - LLM_DEFAULT_PROVIDER=ollama
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    env_file:
      - path: backend/.env
        required: false
    volumes:
      - ./backend:/app
      - teuth_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level info
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  ollama_data:
  teuth_data:
